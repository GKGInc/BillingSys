name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_FUNCTIONAPP_NAME: 'billingsys-func-tech85'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'src/BillingSys.Functions'
  BLAZOR_PROJECT_PATH: 'src/BillingSys.Client'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore src/BillingSys.slnx
    
    - name: Build
      run: dotnet build src/BillingSys.slnx --configuration Release --no-restore

    # Project Pages: https://<org>.github.io/<repo>/  → BaseHref "/<repo>/"
    # User/org site (repo <user>.github.io): set repo variable BLAZOR_BASE_HREF to "/"
    - name: Publish Blazor WASM
      run: dotnet publish ${{ env.BLAZOR_PROJECT_PATH }} -c Release -o blazor-publish
    
    - name: Set base href for GitHub Pages
      run: |
        BASE_HREF="${{ vars.BLAZOR_BASE_HREF || format('/{0}/', github.event.repository.name) }}"
        sed -i "s|<base href=\"/\" />|<base href=\"${BASE_HREF}\" />|g" blazor-publish/wwwroot/index.html
        echo "Set base href to: ${BASE_HREF}"
    
    - name: Upload Blazor artifact
      uses: actions/upload-artifact@v4
      with:
        name: blazor-app
        path: blazor-publish/wwwroot

    - name: Publish Azure Functions
      run: dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }} -c Release -o functions-publish
    
    - name: Upload Functions artifact
      uses: actions/upload-artifact@v4
      with:
        name: functions-app
        path: functions-publish

  deploy-blazor:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Download Blazor artifact
      uses: actions/download-artifact@v4
      with:
        name: blazor-app
        path: ./blazor-output

    - name: Add .nojekyll file
      run: touch ./blazor-output/.nojekyll

    - name: Add 404.html for SPA routing
      run: cp ./blazor-output/index.html ./blazor-output/404.html

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./blazor-output
        force_orphan: true

  deploy-functions:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    
    steps:
    - name: Download Functions artifact
      uses: actions/download-artifact@v4
      with:
        name: functions-app
        path: ./functions-output

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Functions
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: ./functions-output
